        <table>
            <tr>
                <th>Food Item</th>

            </tr>

            </tr>
            <tr>
                <td>Fried Rice</td>

            </tr>
            <tr>
                <td>Noodles</td>

            </tr>

                <td>Ice Cream</td>

            </tr>

        <h3><button>Order Now</button></h3>

    </body>
</html>
